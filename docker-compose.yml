# Coolify deployment — single app container (API + SPA on one port).
# Full guide: DEPLOY_COOLIFY.md
# All environment variables are managed in the Coolify UI (Environment Variables tab).
# Do NOT declare them here — Coolify injects them directly into the container,
# and any variable listed in this file gets locked to the compose file (undeletable from UI).

services:
  mutale:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Only truly static values that never change between environments live here.
      NODE_ENV: production
      PORT: 4000
    volumes:
      # Persist user uploads across deploys/restarts.
      - mutale_uploads:/app/uploads
    expose:
      - "4000"
    # Coolify maps your domain → container port 4000 via its proxy.
    # For a bare `docker compose up` locally, uncomment to publish:
    # ports:
    #   - "4000:4000"

volumes:
  mutale_uploads:
